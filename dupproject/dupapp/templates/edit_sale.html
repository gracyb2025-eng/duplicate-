{% extends 'base_sales.html' %}
{% block content %}
<div class="container mt-5 pt-5">
  <h2>Edit Sale</h2>
  <form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Save Changes</button>
    <a href="{% url 'sales_dashboard' %}" class="btn btn-secondary">Cancel</a>
  </form>
</div>
{% endblock %}
