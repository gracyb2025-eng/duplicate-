<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>
  <!-- Admin Navbar -->
  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="{% url 'admin_dashboard' %}">Admin Panel</a>
      <!-- Hamburger button -->
      <button class="btn btn-outline-light" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasAdmin">
        <i class="fas fa-bars"></i>
      </button>
    </div>
  </nav>

  <!-- Offcanvas Sidebar -->
  <div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasAdmin">
    <div class="offcanvas-header">
      <h5 class="offcanvas-title">Admin Menu</h5>
      <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
      <ul class="list-group">
        <li class="list-group-item"><a href="{% url 'admin_dashboard' %}"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
        <li class="list-group-item"><a href="{% url 'sales_dashboard' %}"><i class="fas fa-shopping-cart"></i> Sales</a></li>
        <li class="list-group-item"><a href="{% url 'stock_dashboard' %}"><i class="fas fa-boxes"></i> Stock</a></li>
        <li class="list-group-item"><a href="{% url 'reports' %}"><i class="fas fa-chart-line"></i> Reports</a></li>
        <li class="list-group-item"><a href="{% url 'supplier_list' %}"><i class="fas fa-truck"></i> Suppliers</a></li>
        
      </ul>
    </div>
  </div>

  <div class="container mt-4">
    {% block content %}{% endblock %}
  </div>

  <footer class="bg-dark text-white text-center py-3 mt-4">
    <p>&copy; 2026 NYONDO General Hardware LTD - Admin Panel</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
