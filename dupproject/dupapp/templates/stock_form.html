{% extends "base_stock.html" %}
{% block content %}
<h2>Add New Stock</h2>

<form method="POST" class="mt-3">
  {% csrf_token %}
  <div class="row">
    <!-- Left Column -->
    <div class="col-md-6">
      <div class="mb-3">
        <label class="form-label">Item Name</label>
        <input type="text" name="item_name" class="form-control" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Specification (Size/Grade/Type)</label>
        <input type="text" name="specification" class="form-control">
      </div>

      <div class="mb-3">
        <label class="form-label">Units Received</label>
        <input type="number" name="quantity" class="form-control" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Unit Cost</label>
        <input type="number" step="0.01" name="unit_cost" class="form-control" required>
      </div>
    </div>

    <!-- Right Column -->
    <div class="col-md-6">
      <div class="mb-3">
        <label class="form-label">Selling Price</label>
        <input type="number" step="0.01" name="selling_price" class="form-control" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Supplier</label>
        <select name="supplier" class="form-select" required>
          {% for supplier in suppliers %}
            <option value="{{ supplier.id }}">{{ supplier.name }}</option>
          {% endfor %}
        </select>
        <!-- Add Supplier Button -->
        <a href="{% url 'add_supplier' %}" class="btn btn-outline-primary btn-sm mt-2">
          <i class="fas fa-user-plus"></i> Add New Supplier
        </a>
      </div>

      <div class="mb-3">
        <label class="form-label">Payment Method</label>
        <select name="payment_method" class="form-select" required>
          <option value="Cash">Cash</option>
          <option value="Credit">Credit</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Amount Paid (if any)</label>
        <input type="number" step="0.01" name="amount_paid" class="form-control">
      </div>
    </div>
  </div>

  <!-- Submit and Cancel Buttons -->
  <button type="submit" class="btn btn-success">Save Stock</button>
  <a href="{% url 'stock_dashboard' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
