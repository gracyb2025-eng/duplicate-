<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>

    
<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">NYONDO Hardware</a>
    <button class="btn btn-outline-light" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasRight">
      <i class="fas fa-bars"></i>
    </button>
  </div>
</nav>


<div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasRight">
  <div class="offcanvas-header">
    <h5 class="offcanvas-title">Menu</h5>
    <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas"></button>
  </div>
  <div class="offcanvas-body">
    <ul class="list-group">
      <li class="list-group-item"><a href="{% url 'sales_dashboard' %}"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
      <li class="list-group-item"><a href="{% url 'save_sale' %}"><i class="fas fa-plus"></i> Add Sale</a></li>
      <li class="list-group-item"><a href="{% url 'add_payment' %}"><i class="fas fa-hand-holding-usd"></i> Credit Payments</a></li>
      <li class="list-group-item"><a href="#"><i class="fas fa-chart-line"></i> Reports</a></li>
    </ul>
  </div>
</div>

    
{% block content %}
{% endblock %}

<footer class="bg-dark text-white text-center py-3 mt-5">
  <div class="container">
    <p class="mb-1">NYONDO GENERAL HARDWARE LTD</p>
    <p class="mb-1">Location: Nansana, Uganda</p>
    <p class="mb-0">&copy; 2026 NYONDO General Hardware LTD. All rights reserved.</p>
  </div>
</footer>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
